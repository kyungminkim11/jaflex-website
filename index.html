<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>有限会社ジャフレックス｜JAFLEX Ltd.</title>
  <style>
    body{margin:0;display:grid;place-items:center;min-height:100vh;font-family:Arial,"Noto Sans JP",sans-serif;color:#17367f;background:#fff}
  </style>
</head>
<body>
  <p>JAFLEX website loading…</p>
  <script>
    (async()=>{
      const paths=["site/part-00.txt","site/part-01.txt"];
      const parts=[];
      for(const path of paths){
        const response=await fetch(path+"?v=20260627");
        if(!response.ok) throw new Error(path);
        parts.push(await response.text());
      }
      document.open();
      document.write(parts.join(""));
      document.close();
    })().catch(error=>{
      document.body.innerHTML="<p>ページの読み込みに失敗しました。再読み込みしてください。</p>";
      console.error(error);
    });
  </script>
</body>
</html>
