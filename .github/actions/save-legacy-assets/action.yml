name: Save imported JAFLEX images
description: Commit imported legacy images and updated layout back to the repository
runs:
  using: composite
  steps:
    - name: Save imported files
      shell: bash
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add assets/legacy index.html style.css
        if git diff --cached --quiet; then
          echo "No imported image changes to save."
        else
          git commit -m "Preserve original JAFLEX website images"
          git push
        fi
